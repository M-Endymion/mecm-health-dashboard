name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */4 * * *'     # Every 4 hours
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Streamlit App to keep it awake
        run: |
          echo "Pinging app at ${{ secrets.STREAMLIT_URL }}"
          curl -I -X GET "${{ secrets.STREAMLIT_URL }}" || true
          echo "✅ Ping sent at $(date)"
